services:
  - type: web
    name: cns-django
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python cns/manage.py collectstatic --noinput && python cns/manage.py migrate
    startCommand: gunicorn --chdir cns cns.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: cns-django.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: GLOBAL_CHAT_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cns-db
          property: connectionString

databases:
  - name: cns-db
    databaseName: cns
    user: cns_user
