{% extends "main/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<form method="POST">
    {% csrf_token %}
    <h2>Login</h2>
    
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    
    {{ form.as_p }}
    <button type="submit" class="login-btn">Login</button>
</form>
{% endblock %}
