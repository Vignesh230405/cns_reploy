{% extends "main/base.html" %}

{% block title %}Logout{% endblock %}

{% block content %}
<h2>Are you sure you want to logout?</h2>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="logout-btn">Logout</button>
</form>

<a href="{% url 'home' %}" class="cancel-btn">Cancel</a>
{% endblock %}
